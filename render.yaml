services:
  # Backend (Rust/Axum)
  - type: web
    name: hello-world-backend
    env: rust
    buildCommand: cd backend && cargo build --release
    startCommand: cd backend && ./target/release/hello-world-backend
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually (NeonDB PostgreSQL)
      - key: MONGODB_URL
        sync: false # Set manually (MongoDB Atlas)
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false # Set manually (Vercel frontend URLs, comma-separated)
      - key: PORT
        value: 3001
      - key: RUST_LOG
        value: info
