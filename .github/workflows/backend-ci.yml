---
name: Backend CI

"on":
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  checks:
    name: Quality & Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-checks-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-checks-
            ${{ runner.os }}-cargo-

      - name: Check formatting (cargo fmt)
        working-directory: ./backend
        run: cargo fmt --all -- --check

      - name: Lint (cargo clippy)
        working-directory: ./backend
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/helloworld
          MONGODB_URL: mongodb://localhost:27017
          JWT_SECRET: ci_lint_dummy_secret

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true

      - name: Run security audit
        working-directory: ./backend
        run: cargo audit
        continue-on-error: true

  build-and-test:
    name: Build & Test (Rust)
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: helloworld
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Setup PostgreSQL (run migrations)
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -U postgres -d helloworld \
            -f backend/migrations/init.sql
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/helloworld

      - name: Build backend
        working-directory: ./backend
        run: cargo build --verbose
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/helloworld
          MONGODB_URL: mongodb://localhost:27017
          JWT_SECRET: ci_test_secret_key_at_least_32_chars

      - name: Run tests
        working-directory: ./backend
        run: cargo test --verbose
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/helloworld
          MONGODB_URL: mongodb://localhost:27017
          JWT_SECRET: ci_test_secret_key_at_least_32_chars
