---
name: Release

"on":
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Create GitHub Release with Changelog
  # ──────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: self-hosted

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout code (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | \
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "First release — full history:"
            CHANGELOG=$(git log --pretty="format:- %s (%h)" | head -30)
          else
            echo "Changes since $PREVIOUS_TAG:"
            CHANGELOG=$(git log "$PREVIOUS_TAG".."$CURRENT_TAG" \
              --pretty="format:- %s (%h)")
          fi

          # Write multiline changelog to file to avoid quoting issues
          echo "$CHANGELOG" > /tmp/changelog.md
          echo "changelog_file=/tmp/changelog.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # JOB 2 — Build & Upload Rust Binary
  # Depends on create-release
  # ──────────────────────────────────────────────
  build-binaries:
    name: Build Binaries
    runs-on: self-hosted
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential pkg-config libssl-dev

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: >-
            ${{ runner.os }}-cargo-release-
            ${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        working-directory: ./backend
        run: cargo build --release --verbose
        env:
          # Dummy values — binary is compiled, not run
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/helloworld
          MONGODB_URL: mongodb://localhost:27017
          JWT_SECRET: release_build_dummy_secret_placeholder

      - name: Rename binary for upload
        run: |
          mv backend/target/release/hello-world-backend \
             hello-world-backend-linux-x86_64

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: hello-world-backend-linux-x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
